name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Scala tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # GitHub-hosted runners do not include `sbt` on PATH; coursier provides it.
      - uses: coursier/setup-action@v1
        with:
          apps: sbt

      - uses: coursier/cache-action@v6

      - name: Test
        run: sbt -batch test
