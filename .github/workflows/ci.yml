# Continuous integration: compile and test on push and PRs.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Scala tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # GitHub-hosted runners do not include `sbt` on PATH; coursier provides it.
      - name: Setup coursier (sbt)
        uses: coursier/setup-action@v1
        with:
          apps: sbt

      - name: Coursier cache
        uses: coursier/cache-action@v6

      - name: Run tests
        run: sbt -batch test

      # Keep bench subprojects compilable on every push so benchmark
      # regressions are caught before the nightly run fires.
      - name: Compile bench subprojects
        run: sbt -batch "bench/Jmh/compile" "benchFs2/Jmh/compile"
